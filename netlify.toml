[build]
  publish = "."
  functions = "netlify/functions"

# No redirect needed — index.html is served automatically

# Cache static assets aggressively
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpeg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Redirect pages that still live on Squarespace (temporary until rebuilt)
[[redirects]]
  from = "/community"
  to = "https://chrysalis-orchid-ne7e.squarespace.com/community"
  status = 302

[[redirects]]
  from = "/going-solo"
  to = "https://chrysalis-orchid-ne7e.squarespace.com/going-solo"
  status = 302

[[redirects]]
  from = "/top50creatorjournalists"
  to = "https://chrysalis-orchid-ne7e.squarespace.com/top50creatorjournalists"
  status = 302

# Install function-level dependencies automatically
[[plugins]]
  package = "@netlify/plugin-functions-install-core"
